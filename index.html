<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Doodle Studio</title>
<style>
:root{--bg:#f6f2ea;--panel:#fffaf2;--ink:#27231f;--muted:#786f63;--border:#d8cfc2;--accent:#2f6f73;}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{padding:24px 20px;text-align:center}
header h1{margin:0;font-size:34px}
header p{margin:8px auto 0;max-width:760px;color:var(--muted)}
.wrap{max-width:1200px;margin:0 auto;padding:0 16px 40px}
.controls{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:16px;display:grid;gap:14px;margin-bottom:18px;box-shadow:0 8px 24px rgba(0,0,0,.05)}
.row{display:flex;flex-wrap:wrap;gap:12px;align-items:end}
.field{display:flex;flex-direction:column;gap:6px;min-width:150px}
.field label{font-weight:700;font-size:13px}
.field span{font-size:12px;color:var(--muted)}
input[type=file],select,input[type=range],button{font:inherit}
select,input[type=file]{padding:9px;border:1px solid var(--border);border-radius:10px;background:white}
input[type=range]{width:180px}
button{border:0;border-radius:12px;background:var(--accent);color:#fff;padding:10px 14px;font-weight:800;cursor:pointer}
button.secondary{background:#5f564c}
button.ghost{background:#e7ded1;color:#2a241f}
button:disabled{opacity:.45;cursor:not-allowed}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.05)}
.panel h2{margin:0 0 10px;font-size:19px}
.canvasBox{background:white;border:1px dashed var(--border);border-radius:14px;min-height:360px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.canvasBox canvas{max-width:100%;height:auto;display:block}
.studio{margin-top:16px}
.traceArea{position:relative;background:white;border:1px solid var(--border);border-radius:14px;min-height:520px;overflow:hidden;touch-action:none}
.traceArea canvas{position:absolute;left:0;top:0;width:100%;height:100%;touch-action:none}
.hint{color:var(--muted);font-size:13px;margin-top:8px}
.status{font-weight:700;color:#604d35;margin-top:6px;min-height:20px}
.tools{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:12px}
@media(max-width:850px){.grid{grid-template-columns:1fr}.canvasBox{min-height:280px}.traceArea{min-height:420px}}
</style>
</head>

<body>
<header>
  <h1>Doodle Studio</h1>
  <p>Upload a photo, generate a printable or traceable art template, then draw over it online.</p>
</header>

<main class="wrap">
<section class="controls">
  <div class="row">
    <div class="field" style="min-width:250px">
      <label for="photoInput">Choose photo</label>
      <input id="photoInput" type="file" accept="image/*">
    </div>

    <div class="field">
      <label for="styleMode">Style</label>
      <select id="styleMode">
        <option value="pencil">Pencil sketch</option>
        <option value="lines">Clean lines</option>
        <option value="hybrid">Pencil + outline</option>
        <option value="cartoon" selected>Cartoon / comic trace</option>
      </select>
    </div>

    <div class="field">
      <label for="detailLevel">Detail</label>
      <select id="detailLevel">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
    </div>

    <div class="field">
      <label for="shadeStrength">Line / shading strength</label>
      <input id="shadeStrength" type="range" min="1" max="10" value="6">
      <span id="shadeLabel">6</span>
    </div>

    <div class="field">
      <label for="guideOpacity">Online guide opacity</label>
      <input id="guideOpacity" type="range" min="10" max="80" value="38">
      <span id="guideLabel">38%</span>
    </div>
  </div>

  <div class="row">
    <button id="generateBtn" disabled>Generate printable template</button>
    <button id="onlineBtn" disabled>Generate online trace template</button>
    <button id="printBtn" class="secondary" disabled>Print template</button>
    <button id="downloadBtn" class="secondary" disabled>Download template PNG</button>
    <button id="clearAllBtn" class="ghost">Clear all</button>
  </div>

  <div id="status" class="status">Choose a photo to begin.</div>
</section>

<section class="grid">
  <div class="panel">
    <h2>Original Photo</h2>
    <div class="canvasBox"><canvas id="originalCanvas"></canvas></div>
  </div>

  <div class="panel">
    <h2>Printable Template</h2>
    <div class="canvasBox"><canvas id="templateCanvas"></canvas></div>
  </div>
</section>

<section class="panel studio">
  <h2>Online Trace Canvas</h2>
  <div class="traceArea" id="traceArea">
    <canvas id="guideCanvas"></canvas>
    <canvas id="drawCanvas"></canvas>
  </div>

  <div class="tools">
    <button id="penBtn">Pen</button>
    <button id="eraserBtn" class="ghost">Eraser</button>

    <div class="field">
      <label for="penSize">Pen size</label>
      <input id="penSize" type="range" min="1" max="18" value="4">
      <span id="penLabel">4</span>
    </div>

    <button id="undoBtn" class="secondary">Undo</button>
    <button id="clearDrawBtn" class="secondary">Clear drawing</button>
    <button id="saveArtBtn" class="secondary">Save artwork PNG</button>
  </div>

  <p class="hint">The guide appears pale underneath. Draw on top with mouse, stylus, or finger.</p>
</section>
</main>

<script>
const $ = id => document.getElementById(id);

const photoInput = $('photoInput');
const orig = $('originalCanvas');
const tmpl = $('templateCanvas');
const guide = $('guideCanvas');
const draw = $('drawCanvas');
const traceArea = $('traceArea');

const octx = orig.getContext('2d');
const tctx = tmpl.getContext('2d');
const gctx = guide.getContext('2d');
const dctx = draw.getContext('2d');

let img = null;
let generated = false;
let drawing = false;
let tool = 'pen';
let history = [];

function setStatus(s){ $('status').textContent = s; }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

$('shadeStrength').oninput = () => $('shadeLabel').textContent = $('shadeStrength').value;
$('guideOpacity').oninput = () => { $('guideLabel').textContent = $('guideOpacity').value + '%'; redrawGuide(); };
$('penSize').oninput = () => $('penLabel').textContent = $('penSize').value;

photoInput.onchange = e => {
  const f = e.target.files[0];
  if(!f) return;

  const url = URL.createObjectURL(f);
  img = new Image();

  img.onload = () => {
    setupCanvases(img);
    drawOriginal();

    $('generateBtn').disabled = false;
    $('onlineBtn').disabled = false;

    generated = false;
    clearCanvas(tctx, tmpl);
    clearCanvas(gctx, guide);
    clearCanvas(dctx, draw);

    setStatus('Photo loaded. Generate a template.');
    URL.revokeObjectURL(url);
  };

  img.src = url;
};

function setupCanvases(im){
  const max = 900;
  let w = im.width;
  let h = im.height;
  const scale = Math.min(max / w, max / h, 1);

  w = Math.round(w * scale);
  h = Math.round(h * scale);

  [orig, tmpl, guide, draw].forEach(c => {
    c.width = w;
    c.height = h;
  });

  resizeTrace();
}

function resizeTrace(){
  if(!img) return;
  const ratio = guide.height / guide.width;
  traceArea.style.height = Math.max(420, Math.round(traceArea.clientWidth * ratio)) + 'px';
  redrawGuide();
}

window.addEventListener('resize', resizeTrace);

function clearCanvas(ctx, canvas){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function drawOriginal(){
  octx.clearRect(0,0,orig.width,orig.height);
  octx.drawImage(img,0,0,orig.width,orig.height);
}

function brightness(data,x,y,w){
  x = clamp(Math.round(x),0,w-1);
  y = clamp(Math.round(y),0,Math.floor(data.length/(4*w))-1);
  const i = (y*w+x)*4;
  return 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
}

function localEdge(data,x,y,w,h){
  const d = 4;
  const bx1 = brightness(data,clamp(x-d,0,w-1),y,w);
  const bx2 = brightness(data,clamp(x+d,0,w-1),y,w);
  const by1 = brightness(data,x,clamp(y-d,0,h-1),w);
  const by2 = brightness(data,x,clamp(y+d,0,h-1),w);
  const gx = bx2 - bx1;
  const gy = by2 - by1;
  return {
    mag: Math.sqrt(gx*gx + gy*gy),
    angle: Math.atan2(gy,gx) + Math.PI/2
  };
}

function generate(){
  if(!img) return;

  const mode = $('styleMode').value;

  tctx.fillStyle = 'white';
  tctx.fillRect(0,0,tmpl.width,tmpl.height);

  const work = document.createElement('canvas');
  work.width = tmpl.width;
  work.height = tmpl.height;

  const wctx = work.getContext('2d');
  wctx.drawImage(img,0,0,work.width,work.height);

  const imageData = wctx.getImageData(0,0,work.width,work.height);
  const pixels = imageData.data;

  if(mode === 'cartoon'){
    generateCartoonTrace(pixels, work.width, work.height);
  } else {
    generatePencilSketch(pixels, work.width, work.height, mode);
  }

  generated = true;
  $('printBtn').disabled = false;
  $('downloadBtn').disabled = false;

  setStatus(mode === 'cartoon'
    ? 'Cartoon / comic trace template generated.'
    : 'Printable template generated.'
  );

  redrawGuide();
}

function generatePencilSketch(pixels,w,h,mode){
  const detail = $('detailLevel').value;
  const cell = detail === 'low' ? 22 : detail === 'medium' ? 16 : 11;
  const strength = +$('shadeStrength').value;

  tctx.lineCap = 'round';
  tctx.lineJoin = 'round';

  for(let y = cell/2; y < h; y += cell){
    for(let x = cell/2; x < w; x += cell){
      const b = brightness(pixels,x,y,w);
      const darkness = 1 - b/255;

      if(darkness < 0.18) continue;

      const local = localEdge(pixels,x,y,w,h);
      const strokes = Math.floor(darkness * (detail === 'high' ? 5 : detail === 'medium' ? 4 : 3)) + (darkness > 0.55 ? 1 : 0);
      const len = cell * (0.45 + darkness * 0.95);
      const lw = 0.45 + darkness * 1.8 * (strength/6);

      tctx.strokeStyle = `rgba(25,22,20,${0.38 + darkness*0.45})`;
      tctx.lineWidth = lw;

      const angle = (local.angle || 0) + (Math.random()-0.5)*0.5;

      for(let s=0; s<strokes; s++){
        const ox = (Math.random()-0.5)*cell*0.55;
        const oy = (Math.random()-0.5)*cell*0.55;

        if(mode === 'lines'){
          drawStroke(tctx,x+ox,y+oy,len*(0.65+Math.random()*0.4),angle,false);
        } else if(mode === 'pencil'){
          drawStroke(tctx,x+ox,y+oy,len*(0.55+Math.random()*0.45),angle+0.15*Math.random(),Math.random()<0.35);
        } else {
          drawStroke(tctx,x+ox,y+oy,len*(0.55+Math.random()*0.45),angle,Math.random()<0.5);
        }
      }
    }
  }

  if(mode === 'hybrid'){
    drawOutlines(pixels,w,h,0.22);
  }
}

function generateCartoonTrace(pixels,w,h){
  const detail = $('detailLevel').value;
  const strength = +$('shadeStrength').value;

  const block = detail === 'low' ? 10 : detail === 'medium' ? 7 : 5;

  tctx.fillStyle = 'white';
  tctx.fillRect(0,0,w,h);

  // Soft grey cartoon tone blocks
  for(let y=0; y<h; y+=block){
    for(let x=0; x<w; x+=block){
      let total = 0, count = 0;

      for(let yy=0; yy<block && y+yy<h; yy+=2){
        for(let xx=0; xx<block && x+xx<w; xx+=2){
          total += brightness(pixels,x+xx,y+yy,w);
          count++;
        }
      }

      const b = total / count;
      const darkness = 1 - b/255;

      if(darkness < 0.16) continue;

      let shade;
      if(darkness > 0.72) shade = 40;
      else if(darkness > 0.52) shade = 85;
      else if(darkness > 0.34) shade = 135;
      else shade = 190;

      const alpha = detail === 'high' ? 0.30 : detail === 'medium' ? 0.24 : 0.18;

      tctx.fillStyle = `rgba(${shade},${shade},${shade},${alpha})`;
      tctx.fillRect(x,y,block,block);
    }
  }

  // Strong cartoon-style outlines
  const step = detail === 'low' ? 5 : detail === 'medium' ? 4 : 3;
  const threshold = detail === 'low' ? 52 : detail === 'medium' ? 42 : 34;

  tctx.lineCap = 'round';
  tctx.lineJoin = 'round';

  for(let y=step; y<h-step; y+=step){
    for(let x=step; x<w-step; x+=step){
      const e = localEdge(pixels,x,y,w,h);
      const b = brightness(pixels,x,y,w);
      const darkness = 1 - b/255;

      if(e.mag > threshold){
        const alpha = clamp(0.18 + (e.mag/150) + darkness*0.18, 0.22, 0.72);
        const lw = clamp((e.mag/60) * (strength/6), 0.7, 3.2);

        tctx.strokeStyle = `rgba(15,15,15,${alpha})`;
        tctx.lineWidth = lw;

        const len = detail === 'high' ? 8 : detail === 'medium' ? 10 : 13;
        drawStroke(tctx,x,y,len,e.angle,false);
      }
    }
  }

  // Simple hatching in darker areas so it is still traceable
  const hatchCell = detail === 'low' ? 24 : detail === 'medium' ? 18 : 14;

  for(let y=hatchCell/2; y<h; y+=hatchCell){
    for(let x=hatchCell/2; x<w; x+=hatchCell){
      const b = brightness(pixels,x,y,w);
      const darkness = 1 - b/255;

      if(darkness < 0.38) continue;

      const strokes = darkness > 0.75 ? 3 : darkness > 0.55 ? 2 : 1;
      const len = hatchCell * (0.55 + darkness*0.4);

      tctx.strokeStyle = `rgba(30,30,30,${0.18 + darkness*0.25})`;
      tctx.lineWidth = 0.7 + darkness * 0.9;

      for(let s=0; s<strokes; s++){
        const oy = (s - 1) * 4;
        drawStroke(tctx,x,y+oy,len,-0.65,false);
      }
    }
  }
}

function drawOutlines(data,w,h,alpha){
  tctx.strokeStyle = `rgba(20,20,20,${alpha})`;
  tctx.lineWidth = 0.7;

  for(let y=3; y<h; y+=6){
    for(let x=3; x<w; x+=6){
      const e = localEdge(data,x,y,w,h);
      if(e.mag > 38){
        drawStroke(tctx,x,y,5,e.angle,false);
      }
    }
  }
}

function drawStroke(ctx,x,y,len,ang,wavy){
  ctx.beginPath();
  const steps = wavy ? 8 : 1;

  for(let i=0; i<=steps; i++){
    const t = i/steps - 0.5;
    const px = x + Math.cos(ang)*len*t;
    const py = y + Math.sin(ang)*len*t;
    const wob = wavy ? Math.sin(i*1.7)*len*0.08 : 0;
    const qx = px + Math.cos(ang+Math.PI/2)*wob;
    const qy = py + Math.sin(ang+Math.PI/2)*wob;

    if(i===0) ctx.moveTo(qx,qy);
    else ctx.lineTo(qx,qy);
  }

  ctx.stroke();
}

$('generateBtn').onclick = generate;

$('onlineBtn').onclick = () => {
  if(!generated) generate();
  redrawGuide();
  clearDrawing();
  setStatus('Online trace template ready. Draw over the pale guide.');
};

function redrawGuide(){
  if(!generated || !img) return;

  gctx.clearRect(0,0,guide.width,guide.height);
  gctx.fillStyle = 'white';
  gctx.fillRect(0,0,guide.width,guide.height);

  gctx.globalAlpha = (+$('guideOpacity').value)/100;
  gctx.drawImage(tmpl,0,0);
  gctx.globalAlpha = 1;
}

function clearDrawing(){
  dctx.clearRect(0,0,draw.width,draw.height);
  history = [];
  saveHistory();
}

function pos(e){
  const r = draw.getBoundingClientRect();
  const p = e.touches ? e.touches[0] : e;

  return {
    x: (p.clientX-r.left) * draw.width/r.width,
    y: (p.clientY-r.top) * draw.height/r.height
  };
}

function saveHistory(){
  try{
    history.push(dctx.getImageData(0,0,draw.width,draw.height));
    if(history.length > 20) history.shift();
  }catch(e){}
}

function start(e){
  e.preventDefault();
  drawing = true;
  saveHistory();

  const p = pos(e);
  dctx.beginPath();
  dctx.moveTo(p.x,p.y);
}

function move(e){
  if(!drawing) return;

  e.preventDefault();

  const p = pos(e);

  dctx.lineCap = 'round';
  dctx.lineJoin = 'round';
  dctx.lineWidth = +$('penSize').value;

  if(tool === 'eraser'){
    dctx.globalCompositeOperation = 'destination-out';
    dctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    dctx.globalCompositeOperation = 'source-over';
    dctx.strokeStyle = '#111';
  }

  dctx.lineTo(p.x,p.y);
  dctx.stroke();
}

function end(){
  drawing = false;
  dctx.globalCompositeOperation = 'source-over';
}

['mousedown','touchstart'].forEach(ev => draw.addEventListener(ev,start,{passive:false}));
['mousemove','touchmove'].forEach(ev => draw.addEventListener(ev,move,{passive:false}));
['mouseup','mouseleave','touchend'].forEach(ev => draw.addEventListener(ev,end));

$('penBtn').onclick = () => {
  tool = 'pen';
  $('penBtn').className = '';
  $('eraserBtn').className = 'ghost';
};

$('eraserBtn').onclick = () => {
  tool = 'eraser';
  $('eraserBtn').className = '';
  $('penBtn').className = 'ghost';
};

$('undoBtn').onclick = () => {
  if(history.length){
    dctx.putImageData(history.pop(),0,0);
  }
};

$('clearDrawBtn').onclick = clearDrawing;

$('printBtn').onclick = () => {
  const url = tmpl.toDataURL('image/png');
  const win = open('');
  win.document.write(`<img src="${url}" style="max-width:100%;"><script>onload=()=>print()<\/script>`);
};

$('downloadBtn').onclick = () => downloadCanvas(tmpl,'doodle-studio-template.png');

$('saveArtBtn').onclick = () => {
  const c = document.createElement('canvas');
  c.width = draw.width;
  c.height = draw.height;

  const cctx = c.getContext('2d');
  cctx.fillStyle = 'white';
  cctx.fillRect(0,0,c.width,c.height);
  cctx.drawImage(guide,0,0);
  cctx.drawImage(draw,0,0);

  downloadCanvas(c,'doodle-studio-artwork.png');
};

function downloadCanvas(c,name){
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = name;
  a.click();
}

$('clearAllBtn').onclick = () => location.reload();
</script>
</body>
</html>
