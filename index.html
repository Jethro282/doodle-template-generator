<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodle Studio - Photo to Cartoon</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
  color:#222;
}
header{
  background:white;
  padding:22px 28px;
  border-bottom:1px solid #ddd;
}
h1{margin:0;font-size:32px}
main{
  max-width:1300px;
  margin:auto;
  padding:22px;
}
.controls{
  background:white;
  border:1px solid #ddd;
  border-radius:14px;
  padding:18px;
  display:grid;
  grid-template-columns:1fr 220px 220px 220px;
  gap:14px;
  align-items:end;
  margin-bottom:18px;
}
label{font-weight:bold;display:block;margin-bottom:8px}
input[type=file]{
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:10px;
}
button{
  padding:13px 16px;
  border:0;
  border-radius:10px;
  background:#246b63;
  color:white;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}
button.secondary{background:#333}
button:disabled{opacity:.45;cursor:not-allowed}
.status{
  margin-top:10px;
  color:#246b63;
  font-weight:bold;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:18px;
}
.panel{
  background:white;
  border:1px solid #ddd;
  border-radius:14px;
  padding:16px;
}
.panel h2{
  margin:0 0 12px;
  font-size:20px;
}
.canvasBox{
  border:1px solid #ddd;
  border-radius:12px;
  background:white;
  min-height:380px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
canvas{
  max-width:100%;
  height:auto;
}
.caption{
  text-align:center;
  color:#666;
  font-size:14px;
  margin-top:10px;
}
@media(max-width:950px){
  .controls,.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
  <h1>Doodle Studio ✏️</h1>
  <p>Photo to cartoon / caricature-style printable template</p>
</header>

<main>

<section class="controls">
  <div>
    <label>Upload photo</label>
    <input id="photoInput" type="file" accept="image/*">
    <div id="status" class="status">Upload a photo to begin.</div>
  </div>

  <button id="generateBtn" disabled>Generate Cartoon</button>
  <button id="printColourBtn" class="secondary" disabled>Print Colour-In</button>
  <button id="printTraceBtn" class="secondary" disabled>Print Trace</button>
</section>

<section class="grid">
  <div class="panel">
    <h2>Original Photo</h2>
    <div class="canvasBox">
      <canvas id="originalCanvas"></canvas>
    </div>
    <div class="caption">Uploaded photo</div>
  </div>

  <div class="panel">
    <h2>Colour-In Cartoon Template</h2>
    <div class="canvasBox">
      <canvas id="colourCanvas"></canvas>
    </div>
    <div class="caption">Lighter lines for colouring in</div>
  </div>

  <div class="panel">
    <h2>Trace Template</h2>
    <div class="canvasBox">
      <canvas id="traceCanvas"></canvas>
    </div>
    <div class="caption">Darker lines for tracing</div>
  </div>
</section>

</main>

<script>
const photoInput = document.getElementById("photoInput");
const generateBtn = document.getElementById("generateBtn");
const printColourBtn = document.getElementById("printColourBtn");
const printTraceBtn = document.getElementById("printTraceBtn");
const statusBox = document.getElementById("status");

const originalCanvas = document.getElementById("originalCanvas");
const colourCanvas = document.getElementById("colourCanvas");
const traceCanvas = document.getElementById("traceCanvas");

const originalCtx = originalCanvas.getContext("2d");
const colourCtx = colourCanvas.getContext("2d");
const traceCtx = traceCanvas.getContext("2d");

let image = null;

photoInput.addEventListener("change", event => {
  const file = event.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  image = new Image();

  image.onload = () => {
    setupCanvases();
    drawOriginal();

    generateBtn.disabled = false;
    statusBox.textContent = "Photo loaded. Click Generate Cartoon.";
    URL.revokeObjectURL(url);
  };

  image.src = url;
});

function setupCanvases(){
  const maxSize = 900;
  const scale = Math.min(maxSize / image.width, maxSize / image.height, 1);
  const w = Math.round(image.width * scale);
  const h = Math.round(image.height * scale);

  [originalCanvas, colourCanvas, traceCanvas].forEach(canvas => {
    canvas.width = w;
    canvas.height = h;
  });
}

function drawOriginal(){
  originalCtx.clearRect(0,0,originalCanvas.width,originalCanvas.height);
  originalCtx.drawImage(image,0,0,originalCanvas.width,originalCanvas.height);
}

generateBtn.addEventListener("click", generateCartoon);

function generateCartoon(){
  const w = colourCanvas.width;
  const h = colourCanvas.height;

  const work = document.createElement("canvas");
  work.width = w;
  work.height = h;

  const workCtx = work.getContext("2d");
  workCtx.drawImage(image,0,0,w,h);

  const data = workCtx.getImageData(0,0,w,h);

  createTemplate(colourCtx, data, w, h, false);
  createTemplate(traceCtx, data, w, h, true);

  printColourBtn.disabled = false;
  printTraceBtn.disabled = false;
  statusBox.textContent = "Cartoon templates created.";
}

function createTemplate(ctx, imageData, w, h, bold){
  ctx.fillStyle = "white";
  ctx.fillRect(0,0,w,h);

  addSoftCartoonShading(ctx, imageData, w, h, bold);
  addCartoonOutlines(ctx, imageData, w, h, bold);
}

function brightness(imageData, x, y, w, h){
  x = Math.max(0, Math.min(w - 1, Math.round(x)));
  y = Math.max(0, Math.min(h - 1, Math.round(y)));

  const i = (y * w + x) * 4;
  const d = imageData.data;

  return 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
}

function edgeStrength(imageData, x, y, w, h){
  const d = 2;

  const gx =
    brightness(imageData, x + d, y, w, h) -
    brightness(imageData, x - d, y, w, h);

  const gy =
    brightness(imageData, x, y + d, w, h) -
    brightness(imageData, x, y - d, w, h);

  return Math.sqrt(gx * gx + gy * gy);
}

function edgeAngle(imageData, x, y, w, h){
  const d = 2;

  const gx =
    brightness(imageData, x + d, y, w, h) -
    brightness(imageData, x - d, y, w, h);

  const gy =
    brightness(imageData, x, y + d, w, h) -
    brightness(imageData, x, y - d, w, h);

  return Math.atan2(gy, gx) + Math.PI / 2;
}

function addSoftCartoonShading(ctx, imageData, w, h, bold){
  const block = 8;

  for(let y = 0; y < h; y += block){
    for(let x = 0; x < w; x += block){
      let total = 0;
      let count = 0;

      for(let yy = 0; yy < block && y + yy < h; yy += 2){
        for(let xx = 0; xx < block && x + xx < w; xx += 2){
          total += brightness(imageData, x + xx, y + yy, w, h);
          count++;
        }
      }

      const b = total / count;
      const dark = 1 - b / 255;

      if(dark < 0.28) continue;

      let shade = 220;

      if(dark > 0.75) shade = 70;
      else if(dark > 0.58) shade = 110;
      else if(dark > 0.42) shade = 165;

      const alpha = bold ? 0.18 : 0.13;

      ctx.fillStyle = `rgba(${shade},${shade},${shade},${alpha})`;
      ctx.fillRect(x,y,block,block);
    }
  }
}

function addCartoonOutlines(ctx, imageData, w, h, bold){
  const step = bold ? 2 : 3;
  const threshold = bold ? 28 : 36;

  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  for(let y = step; y < h - step; y += step){
    for(let x = step; x < w - step; x += step){
      const edge = edgeStrength(imageData, x, y, w, h);

      if(edge < threshold) continue;

      const angle = edgeAngle(imageData, x, y, w, h);
      const b = brightness(imageData, x, y, w, h);
      const dark = 1 - b / 255;

      let alpha = Math.min(1, 0.20 + edge / 90 + dark * 0.22);
      let width = Math.min(4.5, Math.max(0.7, edge / 45));

      if(bold){
        alpha = Math.min(1, alpha + 0.28);
        width *= 1.55;
      } else {
        alpha *= 0.70;
        width *= 0.85;
      }

      ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
      ctx.lineWidth = width;

      const length = bold ? 8 : 6;

      ctx.beginPath();
      ctx.moveTo(
        x - Math.cos(angle) * length / 2,
        y - Math.sin(angle) * length / 2
      );
      ctx.lineTo(
        x + Math.cos(angle) * length / 2,
        y + Math.sin(angle) * length / 2
      );
      ctx.stroke();
    }
  }

  addSimpleCartoonFeatures(ctx, imageData, w, h, bold);
}

function addSimpleCartoonFeatures(ctx, imageData, w, h, bold){
  const cell = bold ? 18 : 24;

  ctx.strokeStyle = bold ? "rgba(0,0,0,0.45)" : "rgba(0,0,0,0.25)";
  ctx.lineWidth = bold ? 1.4 : 0.8;
  ctx.lineCap = "round";

  for(let y = cell / 2; y < h; y += cell){
    for(let x = cell / 2; x < w; x += cell){
      const b = brightness(imageData, x, y, w, h);
      const dark = 1 - b / 255;

      if(dark < 0.50) continue;

      const len = cell * (0.35 + dark * 0.45);

      ctx.beginPath();
      ctx.moveTo(x - len / 2, y);
      ctx.quadraticCurveTo(x, y - cell * 0.12, x + len / 2, y);
      ctx.stroke();
    }
  }
}

printColourBtn.addEventListener("click", () => printCanvas(colourCanvas));
printTraceBtn.addEventListener("click", () => printCanvas(traceCanvas));

function printCanvas(canvas){
  const url = canvas.toDataURL("image/png");

  const win = window.open("");
  win.document.write(`
    <html>
      <head>
        <title>Print Template</title>
        <style>
          body{
            margin:0;
            padding:20px;
            text-align:center;
            background:white;
          }
          img{
            max-width:100%;
            height:auto;
          }
        </style>
      </head>
      <body>
        <img src="${url}">
        <script>
          window.onload = () => window.print();
        <\/script>
      </body>
    </html>
  `);
}
</script>

</body>
</html>
